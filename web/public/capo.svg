<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171B22"/>
      <stop offset="1" stop-color="#090B0F"/>
    </linearGradient>

    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>

    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A98BFF" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#8B7CF6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#8B7CF6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="spoke" gradientUnits="userSpaceOnUse" cx="256" cy="256" r="120">
      <stop offset="0" stop-color="#B3A6FB"/>
      <stop offset="0.5" stop-color="#6FC9DC"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </radialGradient>

    <radialGradient id="sat" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#E0FBFF"/>
      <stop offset="0.5" stop-color="#4FDDEC"/>
      <stop offset="1" stop-color="#1C9BB5"/>
    </radialGradient>

    <radialGradient id="hub" cx="0.42" cy="0.36" r="0.72">
      <stop offset="0" stop-color="#F1ECFE"/>
      <stop offset="0.4" stop-color="#C4B5FD"/>
      <stop offset="0.78" stop-color="#8B7CF6"/>
      <stop offset="1" stop-color="#6D5CF0"/>
    </radialGradient>

    <filter id="bloom" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#vignette)"/>
  <circle cx="256" cy="256" r="220" fill="url(#halo)"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#262C36" stroke-width="2"/>

  <g stroke="url(#spoke)" stroke-width="9" stroke-linecap="round" filter="url(#soft)" opacity="0.95">
    <line x1="256" y1="256" x2="256" y2="136"/>
    <line x1="256" y1="256" x2="370.1" y2="218.9"/>
    <line x1="256" y1="256" x2="326.6" y2="353.1"/>
    <line x1="256" y1="256" x2="185.4" y2="353.1"/>
    <line x1="256" y1="256" x2="141.9" y2="218.9"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="256" cy="136" r="24" fill="url(#sat)"/>
    <circle cx="370.1" cy="218.9" r="24" fill="url(#sat)"/>
    <circle cx="326.6" cy="353.1" r="24" fill="url(#sat)"/>
    <circle cx="185.4" cy="353.1" r="24" fill="url(#sat)"/>
    <circle cx="141.9" cy="218.9" r="24" fill="url(#sat)"/>
  </g>

  <circle cx="256" cy="256" r="74" fill="url(#hub)" filter="url(#bloom)"/>
  <circle cx="256" cy="256" r="74" fill="none" stroke="#E5DEFE" stroke-width="2.5" stroke-opacity="0.55"/>
  <ellipse cx="238" cy="232" rx="26" ry="18" fill="#FFFFFF" opacity="0.28" filter="url(#soft)"/>
</svg>
