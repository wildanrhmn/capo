<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141416"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#2dd4bf" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sat" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#99f6e4"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0d9488"/>
    </radialGradient>
    <radialGradient id="hub" cx="0.42" cy="0.36" r="0.72">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#e4e4e7"/>
      <stop offset="1" stop-color="#a1a1aa"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="210" fill="url(#halo)"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#26262b" stroke-width="2"/>

  <g stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="136"/>
    <line x1="256" y1="256" x2="370.1" y2="218.9"/>
    <line x1="256" y1="256" x2="326.6" y2="353.1"/>
    <line x1="256" y1="256" x2="185.4" y2="353.1"/>
    <line x1="256" y1="256" x2="141.9" y2="218.9"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="256" cy="136" r="22" fill="url(#sat)"/>
    <circle cx="370.1" cy="218.9" r="22" fill="url(#sat)"/>
    <circle cx="326.6" cy="353.1" r="22" fill="url(#sat)"/>
    <circle cx="185.4" cy="353.1" r="22" fill="url(#sat)"/>
    <circle cx="141.9" cy="218.9" r="22" fill="url(#sat)"/>
  </g>

  <circle cx="256" cy="256" r="70" fill="url(#hub)"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5"/>
  <ellipse cx="238" cy="232" rx="24" ry="16" fill="#ffffff" opacity="0.3" filter="url(#soft)"/>
</svg>
